<!DOCTYPE html>
<html lang="vi">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử tra cứu - FakeNews Detector</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* 🔥 Highlight từ khóa */
        .highlight {
            background: linear-gradient(45deg, #ea7c84, #faa6a5);
            color: #fff;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 500;
        }

        /* UI đẹp hơn */
        .table td {
            vertical-align: middle;
        }

        .content-cell {
            max-width: 500px;
            word-wrap: break-word;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <span class="text-danger">FakeNews</span> Detector
        </a>

        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
            <li class="nav-item"><a class="nav-link active" href="/history">Lịch sử</a></li>
            <li class="nav-item"><a class="nav-link" href="/stats">Thống kê</a></li>
        </ul>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">
    <h2 class="text-center mb-4 fw-bold">Lịch sử tra cứu</h2>

    <div class="card shadow-sm p-3">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>STT</th>
                        <th style="width: 50%;">Nội dung</th>
                        <th>Kết quả</th>

                        <th>Thời gian</th>
                    </tr>
                </thead>

                <tbody id="historyTableBody">
                    <tr>
                        <td colspan="5" class="text-center py-4">
                            ⏳ Đang tải dữ liệu...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

<!-- JS -->
<script src="{{ url_for('static', filename='js/history.js') }}"></script>

</body>
</html>
