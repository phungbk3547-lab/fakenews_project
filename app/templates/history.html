<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử tra cứu - FakeNews Detector</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="/"><span>FakeNews</span> Detector</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/history">Lịch sử</a></li>
                    <li class="nav-item"><a class="nav-link" href="/stats">Thống kê</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 main-content">
        <h2 class="text-center mb-4 title-tech">Lịch sử tra cứu</h2>
        
        <div class="glass-card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-pastel">
                        <tr>
                            <th class="text-muted">STT</th>
                            <th style="width: 50%;" class="text-muted">Nội dung</th>
                            <th class="text-muted">Kết quả</th>
                            <th class="text-muted">Độ tin cậy</th>
                            <th class="text-muted">Ngày tra cứu</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr><td colspan="5" class="text-center py-4">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/history.js') }}"></script>
</body>
</html>
