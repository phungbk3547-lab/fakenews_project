<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê - FakeNews Detector</title>

    <!-- Font + Bootstrap -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <span class="text-danger">FakeNews</span> Detector
        </a>

        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Trang chủ</a></li>
            <li class="nav-item"><a class="nav-link" href="/history">Lịch sử</a></li>
            <li class="nav-item"><a class="nav-link active" href="/stats">Thống kê</a></li>
        </ul>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">
    <h2 class="text-center mb-5 fw-bold">Thống kê hệ thống</h2>

    <div class="row g-4">

        <!-- PIE -->
        <div class="col-md-4">
            <div class="card shadow-sm p-3 text-center h-100">
                <h6 class="text-muted mb-3">Tỉ lệ Tin</h6>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <!-- BAR -->
        <div class="col-md-4">
            <div class="card shadow-sm p-3 text-center h-100">
                <h6 class="text-muted mb-3">Độ tin cậy TB</h6>
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <!-- LINE (🔥 ăn điểm) -->
        <div class="col-md-4">
            <div class="card shadow-sm p-3 text-center h-100">
                <h6 class="text-muted mb-3">Xu hướng theo ngày</h6>
                <canvas id="lineChart"></canvas>
            </div>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='js/chart.js') }}"></script>

</body>
</html>
